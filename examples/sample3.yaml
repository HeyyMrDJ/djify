---
# sample-app3 — dockersamples/linux_tweet_app
# Simple nginx app serving static HTML. No env vars required, works out of the box.
apiVersion: djify.io/v1alpha1
kind: App
metadata:
  name: sample-app3
  namespace: default
spec:
  repoUrl: https://github.com/dockersamples/linux_tweet_app
  branch: master
  dockerfilePath: Dockerfile
  contextPath: ""
  port: 80
  replicas: 1
