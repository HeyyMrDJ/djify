{{define "title"}}Deploy app — djify{{end}}

{{define "content"}}
<a class="back-link" href="/">← All apps</a>

<div class="page-header">
  <h1>Deploy a new app</h1>
</div>

<div class="form-card">
  <form method="POST" action="/apps">

    <div class="form-group">
      <label for="name">Name <span class="required">*</span></label>
      <input type="text" id="name" name="name" required
             placeholder="my-app"
             pattern="[a-z0-9][a-z0-9\-]*"
             title="Lowercase letters, numbers, and hyphens only">
      <p class="form-hint">Lowercase letters, numbers, and hyphens. Used as the Kubernetes resource name.</p>
    </div>

    <div class="form-group">
      <label for="repoUrl">Repo URL <span class="required">*</span></label>
      <input type="url" id="repoUrl" name="repoUrl" required
             placeholder="https://github.com/org/repo">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="branch">Branch</label>
        <input type="text" id="branch" name="branch" placeholder="main">
      </div>
      <div class="form-group">
        <label for="port">Port <span class="required">*</span></label>
        <input type="number" id="port" name="port" required
               min="1" max="65535" placeholder="8080">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="dockerfilePath">Dockerfile path</label>
        <input type="text" id="dockerfilePath" name="dockerfilePath"
               placeholder="Dockerfile">
        <p class="form-hint">Relative to context path.</p>
      </div>
      <div class="form-group">
        <label for="contextPath">Context path</label>
        <input type="text" id="contextPath" name="contextPath"
               placeholder="(repo root)">
        <p class="form-hint">Subdirectory within the repo, if any.</p>
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Deploy</button>
      <a href="/" class="btn btn-secondary">Cancel</a>
    </div>

  </form>
</div>
{{end}}
