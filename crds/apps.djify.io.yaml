---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: apps.djify.io
spec:
  group: djify.io
  names:
    kind: App
    listKind: AppList
    plural: apps
    singular: app
    shortNames:
      - dapp
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Image
          type: string
          jsonPath: .status.image
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - repoUrl
                - port
              properties:
                repoUrl:
                  type: string
                  description: "Git repository URL (HTTPS). Example: https://github.com/user/repo"
                branch:
                  type: string
                  default: "main"
                  description: "Git branch to build from"
                dockerfilePath:
                  type: string
                  default: "Dockerfile"
                  description: "Path to the Dockerfile, relative to contextPath (or repo root if contextPath is unset)"
                contextPath:
                  type: string
                  description: "Subdirectory of the repo to use as the build context root. Defaults to the directory containing the Dockerfile. Set to '' or omit to use repo root."
                port:
                  type: integer
                  minimum: 1
                  maximum: 65535
                  description: "Port the application listens on"
                replicas:
                  type: integer
                  minimum: 1
                  default: 1
                  description: "Number of pod replicas"
                ingressHost:
                  type: string
                  description: "Optional: override the default <appname>.djify.local ingress hostname"
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum:
                    - Pending
                    - Building
                    - Deploying
                    - Ready
                    - Failed
                image:
                  type: string
                  description: "Full image reference that was built and deployed"
                lastBuildTime:
                  type: string
                  format: date-time
                message:
                  type: string
                  description: "Human-readable status message or error detail"
