---
# PersistentVolumeClaim for registry image storage
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: registry-storage
  namespace: djify-system
  labels:
    app.kubernetes.io/name: registry
    app.kubernetes.io/managed-by: djify
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  namespace: djify-system
  labels:
    app.kubernetes.io/name: registry
    app.kubernetes.io/managed-by: djify
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: registry
  strategy:
    type: Recreate   # PVC is RWO — only one pod can mount at a time
  template:
    metadata:
      labels:
        app.kubernetes.io/name: registry
    spec:
      containers:
        - name: registry
          image: registry:2
          ports:
            - containerPort: 5000
              name: registry
          env:
            - name: REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY
              value: /var/lib/registry
            - name: REGISTRY_HTTP_ADDR
              value: "0.0.0.0:5000"
            - name: REGISTRY_STORAGE_DELETE_ENABLED
              value: "true"
          volumeMounts:
            - name: storage
              mountPath: /var/lib/registry
          readinessProbe:
            httpGet:
              path: /v2/
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v2/
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: registry-storage

---
apiVersion: v1
kind: Service
metadata:
  name: registry
  namespace: djify-system
  labels:
    app.kubernetes.io/name: registry
    app.kubernetes.io/managed-by: djify
spec:
  selector:
    app.kubernetes.io/name: registry
  ports:
    - name: registry
      port: 5000
      targetPort: 5000
  type: ClusterIP
