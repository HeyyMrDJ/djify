---
# PersistentVolumeClaim for buildkitd layer cache
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: buildkitd-cache
  namespace: djify-system
  labels:
    app.kubernetes.io/name: buildkitd
    app.kubernetes.io/managed-by: djify
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: buildkitd
  namespace: djify-system
  labels:
    app.kubernetes.io/name: buildkitd
    app.kubernetes.io/managed-by: djify
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: buildkitd
  strategy:
    type: Recreate   # PVC is RWO
  template:
    metadata:
      labels:
        app.kubernetes.io/name: buildkitd
    spec:
      containers:
        - name: buildkitd
          image: moby/buildkit:latest
          args:
            - --addr
            - unix:///run/buildkit/buildkitd.sock
            - --addr
            - tcp://0.0.0.0:1234
          ports:
            - containerPort: 1234
              name: buildkitd
          securityContext:
            privileged: true
          readinessProbe:
            exec:
              command:
                - buildctl
                - debug
                - workers
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - buildctl
                - debug
                - workers
            initialDelaySeconds: 15
            periodSeconds: 30
          volumeMounts:
            - name: cache
              mountPath: /var/lib/buildkit
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 2000m
              memory: 2Gi
      volumes:
        - name: cache
          persistentVolumeClaim:
            claimName: buildkitd-cache

---
apiVersion: v1
kind: Service
metadata:
  name: buildkitd
  namespace: djify-system
  labels:
    app.kubernetes.io/name: buildkitd
    app.kubernetes.io/managed-by: djify
spec:
  selector:
    app.kubernetes.io/name: buildkitd
  ports:
    - name: buildkitd
      port: 1234
      targetPort: 1234
  type: ClusterIP
